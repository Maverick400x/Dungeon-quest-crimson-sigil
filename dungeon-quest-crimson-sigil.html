<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DUNGEON QUEST: THE CRIMSON SIGIL</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050001;min-height:100vh;display:flex;justify-content:center;
     align-items:center;overflow:hidden;font-family:'Press Start 2P','Courier New',monospace}
#wrap{position:relative;width:960px;height:540px;transform-origin:center;overflow:hidden;
      flex-shrink:0}
#mc{display:block;position:absolute;inset:0;width:100%;height:100%;
    image-rendering:pixelated;image-rendering:crisp-edges}
/* shared overlay style */
.ov{display:none;position:absolute;inset:0;z-index:10}
/* COMBAT */
#cs{background:rgba(0,0,0,.92);flex-direction:column;padding:14px 18px;gap:10px}
.chdr{font-size:9px;color:#cc2222;letter-spacing:3px;text-align:center;flex-shrink:0}
.cbody{display:flex;gap:14px;flex:1;min-height:0}
/* left: player */
.cpl{width:210px;display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.cpl-name{font-size:6px;color:#ff4444;letter-spacing:1px}
#plcv{image-rendering:pixelated;border:1px solid #380010;background:#040001;flex-shrink:0}
.cbar-row{display:flex;align-items:center;gap:6px;font-size:6px;color:#8a3040}
.cbar{height:8px;background:#150005;border:1px solid #320010;overflow:hidden;flex:1}
.cbfh{height:100%;background:#cc2222;transition:width .3s}
.cbfm{height:100%;background:#2244cc;transition:width .3s}
.cstats{display:grid;grid-template-columns:1fr 1fr;gap:3px 8px;font-size:6px;color:#6a2030;margin-top:2px}
.cstats span{color:#dd7050}
/* center: enemy + log */
.cen-area{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.cen-top{display:flex;gap:12px;align-items:flex-start}
#cep{image-rendering:pixelated;border:1px solid #380010;background:#040001;flex-shrink:0}
.cen-info{flex:1;min-width:0}
#cen{font-size:7px;color:#ff4444;margin-bottom:4px}
#ceph{font-size:5px;color:#ff5500;min-height:10px;margin-bottom:3px}
.cbl{font-size:6px;color:#5a1818;margin-bottom:1px}
.cbtr{height:9px;background:#180303;border:1px solid #420606;overflow:hidden;margin-bottom:3px}
#cehb{height:100%;background:#cc0000;transition:width .35s}
#ceht{font-size:5px;color:#6a2828}
#cl{background:#030001;border:1px solid #160304;padding:5px 7px;flex:1;min-height:0;
    overflow-y:auto;font-size:6px;color:#8a4050;line-height:2}
#cl::-webkit-scrollbar{width:3px}#cl::-webkit-scrollbar-thumb{background:#280008}
.c-h{color:#ff5555}.c-e{color:#ff8844}.c-b{color:#ff2200}.c-g{color:#44cc44}
.c-c{color:#ffe844}.c-d{color:#88aaff}.c-u{color:#ff8800}.c-m{color:#555}.c-p{color:#dd44ff}
/* right: buttons */
.cbts{width:234px;display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.cb{background:#090002;border:1px solid #460f12;color:#c06050;
    font-family:'Press Start 2P',monospace;font-size:6px;padding:10px 8px;cursor:pointer;
    transition:.1s;text-align:left;line-height:1.9;flex:1}
.cb:not(:disabled):hover{background:#1c0006;border-color:#dd2222;color:#fff}
.cb:disabled{color:#361017;border-color:#1e0008;opacity:.45;cursor:default}
.cb.ult{border-color:#994400;color:#ff8830}
.cb.ult:not(:disabled):hover{background:#180600;border-color:#ffaa00;color:#fff}
.cbsub{font-size:5px;color:#4a1820;display:block;margin-top:2px}
.cb.ult .cbsub{color:#4a2008}
/* DIALOGUE */
#dlg{bottom:0;top:auto;height:124px;background:rgba(4,0,12,.97);
     border-top:2px solid #cc2222;flex-direction:row;align-items:flex-start;
     padding:12px 18px 10px;gap:14px;z-index:15}
#dp{image-rendering:pixelated;border:1px solid #380010;background:#030001;flex-shrink:0}
.dta{}
#dn{font-size:7px;color:#ff4444;margin-bottom:5px;letter-spacing:1px}
#dtx{font-size:6px;color:#c88080;line-height:1.9;min-height:32px}
#dpr{font-size:5px;color:#3a1520;margin-top:4px}
/* BUBBLE */
#bbl{display:none;position:absolute;background:#040001;border:2px solid #cc2222;
     padding:6px 10px;font-size:6px;color:#ff9966;max-width:220px;line-height:1.9;
     z-index:20;pointer-events:none}
#bbl::after{content:'▼';position:absolute;bottom:-13px;left:14px;font-size:7px;color:#cc2222}
/* TITLE */
#title{background:#050001;z-index:50;align-items:center;justify-content:center}
#tcv{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated}
/* CHOICE */
#ec{background:rgba(0,0,0,.97);z-index:60;flex-direction:column;
    justify-content:center;align-items:center;gap:14px;padding:24px}
.ecb{background:#080002;border:2px solid #774400;color:#cc7730;
     font-family:'Press Start 2P',monospace;font-size:6px;padding:12px 16px;
     cursor:pointer;width:540px;text-align:left;line-height:2.2}
.ecb:hover{background:#140600;border-color:#ffaa00;color:#fff}
.ecbsub{color:#553020;font-size:5px;display:block;margin-top:4px}
/* ENDING */
#end{background:#040001;z-index:65;flex-direction:column;
     justify-content:center;align-items:center;gap:14px;padding:28px}
#et{font-size:13px;text-align:center;margin-bottom:4px}
#etx{font-size:6px;color:#9a5050;text-align:center;line-height:2.5;max-width:700px}
#eterm{font-size:6px;color:#448844;background:#020802;border:1px solid #1e3a1e;
       padding:12px 16px;width:700px;line-height:2.2}
.rebtn{font-family:'Press Start 2P',monospace;font-size:7px;background:#070001;
       border:2px solid #bb4422;color:#bb4422;padding:10px 20px;cursor:pointer;margin-top:4px}
.rebtn:hover{background:#160400;border-color:#ff6644;color:#fff}
/* GAMEOVER */
#go{background:#040001;z-index:65;flex-direction:column;
    justify-content:center;align-items:center;gap:16px}
</style>
</head>

<script>
'use strict';
// ════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════
const TS=32, VW=30, VH=14;
const GY=48, GH=448;  // game area y offset + height (HUD=48, MSG=44)
const TW=0,TF=1,TC=2,TST=3,TG=4,TP=5,TPRT=6,TTR=7,TBW=8,TBI=9;

// ════════════════════════════════════════════════════
// VIEWPORT SCALING
// ════════════════════════════════════════════════════
function fitScreen(){
  const s=Math.min(window.innerWidth/960,window.innerHeight/540);
  document.getElementById('wrap').style.transform=`scale(${s})`;
}
window.addEventListener('resize',fitScreen);

// ════════════════════════════════════════════════════
// GAME STATE
// ════════════════════════════════════════════════════
let G={
  gs:'title', mode:'village', floor:0,
  pl:{}, ents:[], dmap:[], mw:0, mh:0,
  cam:{x:0,y:0}, camRX:0, camRY:0,
  parts:[], shakeAmt:0, shakeEnd:0,
  bossDefeated:[false,false,false],
  npcMet:{anvil:false,data:false},
  ce:null, cTurn:'p', cTn:0,
  dashReady:false, bPhase:1, glitchMode:false, corrupt:0,
  dLines:[],dIdx:0,dFull:'',dChar:0,dTimer:null,dCb:null,
  bbl:{txt:'',end:0},
  msgs:[], // {txt,type,t}
  lastFrame:0, raf:0
};

const cx=document.getElementById('mc').getContext('2d');
cx.imageSmoothingEnabled=false;

// ════════════════════════════════════════════════════
// AUDIO
// ════════════════════════════════════════════════════
let AC=null;
function au(f,d,tp='square',v=.1,sw=0){
  try{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);o.type=tp;o.frequency.value=f;
    if(sw)o.frequency.exponentialRampToValueAtTime(sw,AC.currentTime+d);
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);}catch(_){}
}
const SFX={
  step:()=>au(85,.03,'square',.05),
  hit:()=>au(130,.08,'sawtooth',.12,55),
  atk:()=>{au(260,.04);setTimeout(()=>au(185,.07),45)},
  chi:()=>{au(523,.07);setTimeout(()=>au(660,.1),80);setTimeout(()=>au(784,.12),160)},
  dash:()=>{au(880,.05,'sine',.1);setTimeout(()=>au(440,.09,'sine',.07),55)},
  ult:()=>[100,200,400,800,600,400,200].forEach((f,i)=>setTimeout(()=>au(f,.12,'sawtooth',.15),i*50)),
  ctr:()=>{au(660,.04,'square',.09);setTimeout(()=>au(880,.07,'square',.09),40)},
  lvl:()=>[261,329,392,523,659].forEach((f,i)=>setTimeout(()=>au(f,.14),i*95)),
  die:()=>[300,240,180,120].forEach((f,i)=>setTimeout(()=>au(f,.25,'sawtooth',.15),i*170)),
  boss:()=>{au(100,.28,'sawtooth',.2);setTimeout(()=>au(78,.28,'sawtooth',.2),260)},
  win:()=>[523,660,784,1047,784,1047,1319].forEach((f,i)=>setTimeout(()=>au(f,.14,'square',.14),i*100)),
  chest:()=>[392,494,587,784].forEach((f,i)=>setTimeout(()=>au(f,.09),i*75)),
  prt:()=>[200,150,100].forEach((f,i)=>setTimeout(()=>au(f,.11),i*80)),
  glitch:()=>{au(80,.1,'sawtooth',.18,800);setTimeout(()=>au(800,.1,'sawtooth',.18,80),110)},
  talk:()=>au(440,.02,'square',.04)
};

// ════════════════════════════════════════════════════
// VILLAGE MAP — 30×14
// ════════════════════════════════════════════════════
const VMAP=[
  [TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW],
  [TW,TG,TG,TG,TG,TTR,TG,TG,TG,TTR,TG,TG,TG,TG,TG,TG,TG,TG,TG,TTR,TG,TG,TG,TG,TG,TTR,TG,TG,TG,TW],
  [TW,TG,TBW,TBW,TBW,TG,TG,TBW,TBW,TBW,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TBW,TBW,TBW,TG,TG,TG,TG,TG,TW],
  [TW,TG,TBW,TBI,TBW,TG,TG,TBW,TBI,TBW,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TBW,TBI,TBW,TG,TG,TG,TG,TG,TW],
  [TW,TG,TBW,TBW,TBW,TG,TG,TBW,TBW,TBW,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TBW,TBW,TBW,TG,TG,TG,TG,TG,TW],
  [TW,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TW],
  [TW,TG,TG,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TG,TG,TG,TG,TG,TW],
  [TW,TTR,TG,TP,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TP,TG,TG,TG,TTR,TG,TW],
  [TW,TG,TG,TP,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TP,TG,TG,TG,TG,TG,TW],
  [TW,TG,TG,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TP,TPRT,TP,TP,TP,TP,TP,TP,TP,TP,TP,TG,TG,TG,TG,TG,TW],
  [TW,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TW],
  [TW,TG,TTR,TG,TG,TG,TG,TG,TG,TG,TTR,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TTR,TG,TG,TG,TG,TG,TG,TG,TW],
  [TW,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TG,TW],
  [TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW,TW]
];
const VNPCS=[
  {id:'anvil',x:3,y:3,type:'anvil',name:'ANVIL-7'},
  {id:'data',x:8,y:3,type:'data',name:'DATA-MOTHER'},
  {id:'goat',x:13,y:8,type:'goat',name:'GOAT'}
];

// ════════════════════════════════════════════════════
// DUNGEON CONFIG
// ════════════════════════════════════════════════════
const DFLOORS=[
  {name:'BASTION OF IRON',w:46,h:30,rooms:7,bg:'#060304',wc:'#3c2a1c',wh:'#584030',fc:'#1c1410',
   en:[{t:'ironguard',n:4},{t:'slimemook',n:3}],ch:4,
   boss:{t:'warden',n:'WARDEN SLIME',hp:80,atk:10,def:3,xp:40}},
  {name:'HALL OF THE DAMNED',w:50,h:34,rooms:8,bg:'#040608',wc:'#283848',wh:'#384e60',fc:'#141d24',
   en:[{t:'damned',n:4},{t:'scout',n:3}],ch:4,
   boss:{t:'dullahan',n:'THE DULLAHAN',hp:100,atk:13,def:4,xp:60}},
  {name:"WEAVER'S SPIRE",w:54,h:36,rooms:9,bg:'#060208',wc:'#481828',wh:'#682838',fc:'#1e0c10',
   en:[{t:'wraith',n:4},{t:'drone',n:3}],ch:5,
   boss:{t:'morgana',n:'MORGANA',hp:120,atk:15,def:5,xp:100}}
];
const EDEFS={
  ironguard:{n:'IRON GUARD',hp:20,atk:7,def:2,xp:8,mv:900},
  slimemook:{n:'SLIME MOOK',hp:14,atk:5,def:0,xp:6,mv:1100},
  damned:{n:'DAMNED SOLDIER',hp:22,atk:9,def:2,xp:10,mv:850},
  scout:{n:'HEADLESS SCOUT',hp:12,atk:8,def:1,xp:8,mv:700},
  wraith:{n:'CODE WRAITH',hp:25,atk:12,def:3,xp:14,mv:800},
  drone:{n:'GLITCH DRONE',hp:10,atk:11,def:0,xp:10,mv:600}
};

function ri(a,b){return Math.floor(Math.random()*(b-a))+a}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

function genFloor(fi){
  const cfg=DFLOORS[fi];
  const{w,h,rooms:nr,en,ch}=cfg;
  const m=Array(h).fill(0).map(()=>Array(w).fill(TW));
  const rooms=[];
  for(let a=0;a<nr*8&&rooms.length<nr;a++){
    const rw=ri(5,12),rh=ri(4,9),rx=ri(1,w-rw-1),ry=ri(1,h-rh-1);
    let ok=true;
    for(const r of rooms)
      if(rx<=r.x+r.w+1&&rx+rw>=r.x-1&&ry<=r.y+r.h+1&&ry+rh>=r.y-1){ok=false;break}
    if(!ok)continue;
    rooms.push({x:rx,y:ry,w:rw,h:rh});
    for(let y=ry;y<ry+rh;y++)for(let x=rx;x<rx+rw;x++)m[y][x]=TF;
  }
  for(let i=0;i<rooms.length-1;i++){
    const a=rooms[i],b=rooms[i+1];
    const ax=ri(a.x+1,a.x+a.w-1),ay=ri(a.y+1,a.y+a.h-1);
    const bx=ri(b.x+1,b.x+b.w-1),by2=ri(b.y+1,b.y+b.h-1);
    if(Math.random()<.5){
      for(let x=Math.min(ax,bx);x<=Math.max(ax,bx);x++)m[ay][x]=TF;
      for(let y=Math.min(ay,by2);y<=Math.max(ay,by2);y++)m[y][bx]=TF;
    }else{
      for(let y=Math.min(ay,by2);y<=Math.max(ay,by2);y++)m[y][ax]=TF;
      for(let x=Math.min(ax,bx);x<=Math.max(ax,bx);x++)m[by2][x]=TF;
    }
  }
  const r0=rooms[0];
  G.pl.x=r0.x+Math.floor(r0.w/2);G.pl.y=r0.y+Math.floor(r0.h/2);
  const rL=rooms[rooms.length-1];
  const bsx=rL.x+Math.floor(rL.w/2),bsy=rL.y+Math.floor(rL.h/2);
  m[bsy][bsx]=TST;
  const mid=rooms.length>=3?rooms.slice(1,-1):rooms;
  const ents=[];let ri2=0;
  for(const{t,n}of en){
    for(let i=0;i<n;i++){
      const r=mid[ri2%mid.length];ri2++;
      let ex,ey,tr=0;
      do{ex=ri(r.x+1,r.x+r.w-1);ey=ri(r.y+1,r.y+r.h-1);tr++}
      while(tr<20&&ents.some(e=>e.x===ex&&e.y===ey));
      const d=EDEFS[t];
      ents.push({t,x:ex,y:ey,hp:d.hp,mhp:d.hp,atk:d.atk,def:d.def,xp:d.xp,n:d.n,
        alive:true,animX:0,animY:0,ws:0,hf:0,nm:ri(400,1200),mv:d.mv+ri(-150,150),boss:false});
    }
  }
  for(let i=0;i<ch;i++){
    const r=mid[Math.floor(Math.random()*mid.length)];
    let cx2,cy2,tr=0;
    do{cx2=ri(r.x+1,r.x+r.w-1);cy2=ri(r.y+1,r.y+r.h-1);tr++}
    while(tr<25&&(m[cy2][cx2]!==TF||ents.some(e=>e.x===cx2&&e.y===cy2)||(cx2===G.pl.x&&cy2===G.pl.y)));
    if(tr<25)m[cy2][cx2]=TC;
  }
  const bd=cfg.boss;
  ents.push({t:bd.t,x:bsx-1,y:bsy,hp:bd.hp,mhp:bd.hp,atk:bd.atk,def:bd.def,
    xp:bd.xp,n:bd.n,alive:!G.bossDefeated[fi],animX:0,animY:0,ws:0,hf:0,nm:999999,mv:0,boss:true});
  return{m,ents,w,h};
}

function addPart(wx,wy,col,txt,life=900){G.parts.push({wx,wy,col,txt,born:performance.now(),life});}
function doShake(amt,dur){G.shakeAmt=amt;G.shakeEnd=performance.now()+dur;}
function renderParts(now){
  cx.font='6px "Press Start 2P","Courier New"';cx.textAlign='center';
  const alive=[];
  for(const p of G.parts){
    const age=now-p.born;if(age>=p.life)continue;alive.push(p);
    const t=age/p.life;
    const sx=p.wx-G.camRX,sy=p.wy-G.camRY+GY-t*30;
    if(sx<-50||sx>1010||sy<GY-20||sy>GY+GH+10)continue;
    cx.globalAlpha=Math.max(0,1-t*t);cx.fillStyle=p.col;
    cx.fillText(p.txt,Math.round(sx),Math.round(sy));
  }
  cx.globalAlpha=1;cx.textAlign='left';G.parts=alive;
}

// ════════════════════════════════════════════════════
function updCam(){
  if(G.mode==='village'){G.cam.x=0;G.cam.y=0;}
  else{
    G.cam.x=clamp(G.pl.x-Math.floor(VW/2),0,Math.max(0,G.mw-VW));
    G.cam.y=clamp(G.pl.y-Math.floor(VH/2),0,Math.max(0,G.mh-VH));
  }
}
function updAnim(dt){
  const decay=Math.pow(.001,dt/130);
  G.pl.animX*=decay;G.pl.animY*=decay;
  if(Math.abs(G.pl.animX)<.4)G.pl.animX=0;if(Math.abs(G.pl.animY)<.4)G.pl.animY=0;
  for(const e of G.ents){
    e.animX*=decay;e.animY*=decay;
    if(Math.abs(e.animX)<.4)e.animX=0;if(Math.abs(e.animY)<.4)e.animY=0;
  }
  const lf=Math.min(1,dt/65);
  G.camRX+=(G.cam.x*TS-G.camRX)*lf;G.camRY+=(G.cam.y*TS-G.camRY)*lf;
}

// ════════════════════════════════════════════════════
// ENEMY AI
// ════════════════════════════════════════════════════
function moveEnemy(e,now){
  if(!e.alive||e.boss)return;
  const ddx=G.pl.x-e.x,ddy=G.pl.y-e.y,dist=Math.abs(ddx)+Math.abs(ddy);
  const sr=e.t==='slimemook'?0:e.t==='drone'?6:8;
  const sc=e.t==='drone'?.55:.42;
  let dirs=[];
  if(dist>0&&dist<=sr&&Math.random()<sc){
    if(Math.abs(ddx)>=Math.abs(ddy)){if(ddx)dirs.push([Math.sign(ddx),0]);if(ddy)dirs.push([0,Math.sign(ddy)]);}
    else{if(ddy)dirs.push([0,Math.sign(ddy)]);if(ddx)dirs.push([Math.sign(ddx),0]);}
    dirs.push(...[[0,-1],[0,1],[-1,0],[1,0]].sort(()=>Math.random()-.5));
  }else{
    if(Math.random()>.5)return;
    dirs=[[0,-1],[0,1],[-1,0],[1,0]].sort(()=>Math.random()-.5);
  }
  for(const[mx,my]of dirs){
    const nx=e.x+mx,ny=e.y+my;
    if(ny<0||ny>=G.mh||nx<0||nx>=G.mw||G.dmap[ny][nx]===TW)continue;
    if(G.ents.some(o=>o.alive&&o!==e&&o.x===nx&&o.y===ny))continue;
    if(nx===G.pl.x&&ny===G.pl.y){
      e.animX=mx*TS*.4;e.animY=my*TS*.4;doShake(3,200);
      const dmg=Math.max(1,Math.floor(e.atk*.22));
      G.pl.hp=Math.max(0,G.pl.hp-dmg);G.pl.hf=now+230;
      addPart(G.pl.x*TS+16,G.pl.y*TS,'#ff9900','-'+dmg+' AMBUSH!',1100);
      addMsg('AMBUSHED by '+e.n+'! -'+dmg,'boss');SFX.hit();updBars();
      setTimeout(()=>{if(G.gs==='explore')initCombat(e);},170);return;
    }
    e.animX=(e.x-nx)*TS;e.animY=(e.y-ny)*TS;e.x=nx;e.y=ny;e.ws=(e.ws+1)%4;break;
  }
}

function tryMove(dx,dy){
  if(G.gs!=='explore')return;
  const nx=G.pl.x+dx,ny=G.pl.y+dy;
  if(G.mode==='village'){
    if(ny<0||ny>=14||nx<0||nx>=30)return;
    const t=VMAP[ny][nx];
    if(t===TW||t===TBW||t===TTR){showQuip('wall');return;}
    for(const npc of VNPCS){if(npc.x===nx&&npc.y===ny){talkNPC(npc);return;}}
    if(t===TPRT){enterDungeon();return;}
    G.pl.animX=(G.pl.x-nx)*TS;G.pl.animY=(G.pl.y-ny)*TS;
    G.pl.x=nx;G.pl.y=ny;G.pl.ws=(G.pl.ws+1)%4;SFX.step();updCam();
  }else{
    if(ny<0||ny>=G.mh||nx<0||nx>=G.mw||G.dmap[ny][nx]===TW){showQuip('wall');return;}
    const e=G.ents.find(e=>e.alive&&e.x===nx&&e.y===ny);
    if(e){initCombat(e);return;}
    G.pl.animX=(G.pl.x-nx)*TS;G.pl.animY=(G.pl.y-ny)*TS;
    G.pl.x=nx;G.pl.y=ny;G.pl.ws=(G.pl.ws+1)%4;SFX.step();updCam();
    const t=G.dmap[ny][nx];
    if(t===TC)openChest(nx,ny);
    else if(t===TST){
      if(G.ents.some(e=>e.boss&&e.alive)){addMsg('The boss blocks the stairs!');showQuip('wall');return;}
      descend();
    }
    if(Math.random()<.036)showQuip('idle');
  }
}
function talkNPC(npc){
  if(npc.id==='anvil'){G.npcMet.anvil=true;startDlg('anvil');}
  else if(npc.id==='data'){G.npcMet.data=true;startDlg('data');}
  else startDlg('goat');
}
function enterDungeon(){
  showQuip('enter');G.mode='dungeon';
  const r=genFloor(0);G.dmap=r.m;G.mw=r.w;G.mh=r.h;G.ents=r.ents;
  updCam();G.camRX=G.cam.x*TS;G.camRY=G.cam.y*TS;G.pl.animX=0;G.pl.animY=0;
  addMsg('Entered '+DFLOORS[0].name+'!','boss');SFX.prt();
}
function descend(){
  if(G.floor>=2)return;G.floor++;
  const r=genFloor(G.floor);G.dmap=r.m;G.mw=r.w;G.mh=r.h;G.ents=r.ents;
  updCam();G.camRX=G.cam.x*TS;G.camRY=G.cam.y*TS;G.pl.animX=0;G.pl.animY=0;
  addMsg('Descended to '+DFLOORS[G.floor].name+'!','boss');SFX.prt();
  if(G.floor===1)showQuip('f2');else if(G.floor===2)showQuip('f3');
}
function openChest(x,y){
  G.dmap[y][x]=TF;SFX.chest();
  const r=Math.random();
  if(r<.45){G.pl.chimi++;addMsg('Found a CHIMICHANGA! 🌮','item');showQuip('chest');}
  else if(r<.65){G.pl.atk++;addMsg('Weapon upgrade! ATK+1','item');}
  else if(r<.85){G.pl.def++;addMsg('Armor shard! DEF+1','item');}
  else{G.pl.chimi+=2;addMsg('DOUBLE chimichanga!','item');showQuip('chest');}
  addPart(x*TS+16,y*TS,'#ffd700','LOOT!');updUI();
}

function initCombat(e){
  if(G.gs==='combat')return;
  G.gs='combat';G.ce=e;G.cTurn='p';G.cTn=0;
  G.dashReady=false;G.bPhase=1;G.glitchMode=false;G.corrupt=0;
  if(e.boss){
    const key=e.t+'_intro';
    if(DLG[key]){G.gs='dialogue';startDlg(key,()=>{G.gs='combat';showCombatUI();SFX.boss();});return;}
  }
  showCombatUI();if(e.boss)SFX.boss();else SFX.hit();
}
function showCombatUI(){
  const e=G.ce;if(!e)return;
  document.getElementById('cs').style.display='flex';
  document.getElementById('chdr').textContent=e.boss?'⚔ BOSS BATTLE ⚔':'⚔ ENCOUNTER ⚔';
  refreshCUI();clrCLog();
  clog(e.boss?'A mighty foe appears! '+e.n+'!':e.n+' attacks!',e.boss?'c-b':'c-e');
}
function refreshCUI(){
  const e=G.ce,p=G.pl;if(!e)return;
  // Enemy info
  document.getElementById('cen').textContent=e.n;
  document.getElementById('ceht').textContent=Math.max(0,e.hp)+'/'+e.mhp;
  document.getElementById('cehb').style.width=Math.max(0,e.hp/e.mhp*100)+'%';
  document.getElementById('ceph').textContent=e.boss&&G.bPhase>1?'⚠ PHASE '+G.bPhase+(G.glitchMode?' [GLITCH MODE]':''):'';
  // Player info (combat panel)
  document.getElementById('phb').style.width=Math.max(0,p.hp/p.mhp*100)+'%';
  document.getElementById('pmb').style.width=Math.max(0,p.mp/p.mmp*100)+'%';
  document.getElementById('phv').textContent=Math.max(0,p.hp)+'/'+p.mhp;
  document.getElementById('pmv').textContent=p.mp+'/'+p.mmp;
  document.getElementById('catk').textContent=p.atk+(G.corrupt>0?'↓':'');
  document.getElementById('cdef').textContent=p.def;
  document.getElementById('cchi').textContent=p.chimi;
  document.getElementById('clv').textContent=p.lv;
  // Redraw player in combat
  const plcv=document.getElementById('plcv');
  const pc=plcv.getContext('2d');pc.imageSmoothingEnabled=false;
  pc.fillStyle='#040001';pc.fillRect(0,0,96,96);
  drawMerc(pc,32,16,Math.floor(performance.now()/400)%2*2,false,G.pl.hf,performance.now());
  // Enemy portrait
  const ep=document.getElementById('cep');
  const ec=ep.getContext('2d');ec.imageSmoothingEnabled=false;
  ec.fillStyle='#040001';ec.fillRect(0,0,96,96);
  const now=performance.now();
  if(e.boss)drawBoss(ec,e.t,16,8,G.bPhase,now,e);
  else{const t=document.createElement('canvas');t.width=32;t.height=32;
       const tc=t.getContext('2d');tc.imageSmoothingEnabled=false;
       drawEnemy(tc,e.t,0,0,e,now);ec.drawImage(t,0,0,32,32,16,16,64,64);}
  // Buttons
  document.getElementById('cb2').querySelector('.cbsub').textContent='Consume one · heal ~35% HP · (×'+p.chimi+')';
  const on=G.cTurn==='p';
  document.getElementById('cb1').disabled=!on;
  document.getElementById('cb2').disabled=!on||p.chimi<=0;
  document.getElementById('cb3').disabled=!on||p.mp<4;
  document.getElementById('cb4').disabled=!on||p.mp<10;
}
function clog(txt,cls=''){
  const l=document.getElementById('cl');
  const d=document.createElement('div');d.textContent=txt;if(cls)d.className=cls;
  l.appendChild(d);l.scrollTop=l.scrollHeight;
}
function clrCLog(){document.getElementById('cl').innerHTML='';}
function dCBtns(on){['cb1','cb2','cb3','cb4'].forEach(id=>document.getElementById(id).disabled=on);}

function ca(act){
  if(G.cTurn!=='p'||!G.ce)return;
  const e=G.ce,now=performance.now();
  G.cTurn='wait';G.cTn++;dCBtns(true);
  let d=0;
  if(act==='atk'){
    d=Math.max(1,G.pl.atk-e.def+ri(0,4));
    const crit=Math.random()<.13;
    if(crit){d=Math.floor(d*1.7);clog('CRITICAL HIT!','c-h');}
    e.hp-=d;e.hf=now+200;
    clog('You strike for '+d+(crit?' (CRIT!)':'')+'!','c-h');
    addPart(e.x*TS+16,e.y*TS,'#ff5555','-'+d+(crit?' CRIT':''));
    SFX.atk();doShake(2,140);
  }else if(act==='chi'){
    if(G.pl.chimi<=0){G.cTurn='p';dCBtns(false);refreshCUI();return;}
    G.pl.chimi--;const h=Math.floor(G.pl.mhp*.35)+ri(0,8);
    G.pl.hp=Math.min(G.pl.mhp,G.pl.hp+h);
    clog('"Deep-fried mystery meat. Medical science." +'+h+' HP!','c-g');
    addPart(G.pl.x*TS+16,G.pl.y*TS,'#44cc44','+'+h+' HP!');
    SFX.chi();doShake(2,220);updBars();showQuip('chi');
    checkBossPhase(now);refreshCUI();
    if(e.hp<=0){setTimeout(()=>combatWin(),500);return;}
    setTimeout(()=>enemyTurn(),800);return;
  }else if(act==='dsh'){
    if(G.pl.mp<4){G.cTurn='p';dCBtns(false);refreshCUI();return;}
    G.pl.mp-=4;G.dashReady=true;
    clog('"Frame-Skip activated! 60% dodge · counter if dodged."','c-d');
    addPart(G.pl.x*TS+16,G.pl.y*TS,'#88aaff','FRAME-SKIP!');SFX.dash();updBars();
    if(e.t==='dullahan'&&G.cTn%3===0){
      const bd=Math.max(1,Math.floor(G.pl.atk*.65));e.hp-=bd;e.hf=now+280;
      clog('COORDINATION GAP! Exploit hit for '+bd+'!','c-c');
      addPart(e.x*TS+16,e.y*TS-8,'#ffe844','COORD EXPLOIT! -'+bd,1100);
    }
    checkBossPhase(now);refreshCUI();
    if(e.hp<=0){setTimeout(()=>combatWin(),500);return;}
    setTimeout(()=>enemyTurn(),700);return;
  }else if(act==='ult'){
    if(G.pl.mp<10){G.cTurn='p';dCBtns(false);refreshCUI();return;}
    G.pl.mp-=10;
    d=Math.max(3,Math.floor(G.pl.atk*(e.t==='morgana'?4:3))+ri(0,5));
    e.hp-=d;e.hf=now+420;
    clog('"MAXIMUM EFFORT." '+d+' DAMAGE!!','c-u');
    addPart(e.x*TS+16,e.y*TS,'#ff8800','MAX EFFORT!! -'+d,1500);
    SFX.ult();doShake(6,400);updBars();
    if(e.t==='morgana'){SFX.glitch();clog('[ERROR BOXES EVERYWHERE]','c-p');}
  }
  checkBossPhase(now);refreshCUI();
  document.getElementById('cehb').style.width=Math.max(0,e.hp/e.mhp*100)+'%';
  document.getElementById('ceht').textContent=Math.max(0,e.hp)+'/'+e.mhp;
  if(e.hp<=0){setTimeout(()=>combatWin(),550);return;}
  setTimeout(()=>enemyTurn(),720);
}

function checkBossPhase(now){
  const e=G.ce;if(!e?.boss)return;
  const pct=e.hp/e.mhp;
  if(e.t==='warden'){
    const np=pct>.625?1:pct>.25?2:3;
    if(np!==G.bPhase){
      G.bPhase=np;G.cTurn='wait';dCBtns(true);
      setTimeout(()=>{G.gs='dialogue';startDlg(np===2?'warden_p2':'warden_p3',()=>{G.gs='combat';G.cTurn='p';dCBtns(false);refreshCUI();});},280);
    }
  }else if(e.t==='morgana'){
    const np=pct>.5?1:pct>.25?2:3;
    if(np!==G.bPhase){
      G.bPhase=np;
      if(np===2){
        G.glitchMode=true;G.cTurn='wait';dCBtns(true);
        setTimeout(()=>{G.gs='dialogue';startDlg('morgana_glitch',()=>{G.gs='combat';clog('GLITCH MODE activated! Damage is now erratic!','c-p');G.cTurn='p';dCBtns(false);refreshCUI();});},280);
      }else if(np===3){
        G.cTurn='wait';dCBtns(true);
        setTimeout(()=>{G.gs='dialogue';startDlg('morgana_low',()=>{G.gs='combat';G.pl.mp=Math.max(G.pl.mp,10);clog('"MAXIMUM EFFORT is now FREE." The game breaks.','c-u');updBars();G.cTurn='p';dCBtns(false);refreshCUI();});},280);
      }
    }
  }
}

function enemyTurn(){
  if(!G.ce)return;
  const e=G.ce,now=performance.now();
  // Dodge check
  if(G.dashReady&&Math.random()<.60){
    G.dashReady=false;
    clog('"Did you miss me? Your pathfinding certainly did." DODGE!','c-d');SFX.dash();
    const cd=Math.max(1,Math.floor(G.pl.atk*.48));e.hp-=cd;e.hf=now+200;
    clog('Counter-strike! '+cd+' damage!','c-c');SFX.ctr();
    addPart(e.x*TS+16,e.y*TS,'#ffe844','COUNTER! -'+cd);showQuip('ctr');
    refreshCUI();document.getElementById('cehb').style.width=Math.max(0,e.hp/e.mhp*100)+'%';
    document.getElementById('ceht').textContent=Math.max(0,e.hp)+'/'+e.mhp;
    if(e.hp<=0){setTimeout(()=>combatWin(),380);return;}
    G.cTurn='p';dCBtns(false);refreshCUI();return;
  }
  G.dashReady=false;
  // Dullahan argument every 3rd turn
  if(e.t==='dullahan'&&G.cTn%3===2&&G.cTn>0){
    G.cTurn='wait';dCBtns(true);
    setTimeout(()=>{G.gs='dialogue';startDlg('dullahan_argue',()=>{G.gs='combat';clog('Dullahan SKIPS its turn! Coordination failure!','c-m');G.cTurn='p';dCBtns(false);refreshCUI();});},150);
    return;
  }
  // Boss specials
  let d=0;
  if(e.boss&&e.t==='warden'&&G.cTn%4===0){
    d=Math.max(2,Math.floor(e.atk*1.45)-G.pl.def+ri(0,3));
    clog('TERMINATION SEQUENCE! Crushed for '+d+'!','c-b');doShake(5,320);
  }else if(e.boss&&e.t==='dullahan'&&G.cTn%4===0){
    d=Math.max(2,Math.floor(e.atk*1.6)-G.pl.def+ri(0,4));
    clog('BAN HAMMER! Smashed for '+d+'!','c-b');doShake(6,360);
    e.animX=Math.sign(G.pl.x-e.x)*TS*.45;e.animY=Math.sign(G.pl.y-e.y)*TS*.45;
  }else if(e.boss&&e.t==='morgana'){
    if(G.glitchMode){
      d=Math.max(1,Math.floor(e.atk*(0.5+Math.random()*2.5))-G.pl.def);
      clog('GLITCH DAMAGE: '+d+'! [randomness intensifies]','c-p');doShake(4,280);
    }else if(G.cTn%3===0){
      d=Math.max(1,e.atk-G.pl.def+ri(0,3));G.corrupt=2;
      clog('CORRUPTION CURSE! Your ATK is reduced for 2 turns!','c-p');doShake(3,250);
    }else{d=Math.max(1,e.atk-G.pl.def+ri(0,4));doShake(3,200);clog(e.n+' attacks for '+d+'!','c-e');}
  }else{
    d=Math.max(1,e.atk-G.pl.def+ri(0,3));
    if(e.boss)doShake(3,200);
    clog(e.n+(e.boss?' ATTACKS':' strikes')+' for '+d+'!','c-e');
    e.animX=Math.sign(G.pl.x-e.x)*TS*.32;e.animY=Math.sign(G.pl.y-e.y)*TS*.32;
  }
  if(G.corrupt>0){d+=3;G.corrupt--;clog('Corruption: +3 damage to you!','c-p');}
  G.pl.hp=Math.max(0,G.pl.hp-d);G.pl.hf=now+220;
  SFX.hit();addPart(G.pl.x*TS+16,G.pl.y*TS,'#ff8844','-'+d);updBars();
  if(G.pl.hp<G.pl.mhp*.35)showQuip('low');
  // Passive counter (18%)
  if(G.pl.hp>0&&Math.random()<.18){
    const cd=Math.max(1,Math.floor(G.pl.atk*.38)+ri(0,2));
    e.hp=Math.max(0,e.hp-cd);e.hf=now+180;
    clog('COUNTER STRIKE! +'+cd+' back!','c-c');SFX.ctr();
    addPart(e.x*TS+16,e.y*TS-8,'#ffe844','COUNTER! -'+cd,1100);showQuip('ctr');
    refreshCUI();document.getElementById('cehb').style.width=Math.max(0,e.hp/e.mhp*100)+'%';
    document.getElementById('ceht').textContent=Math.max(0,e.hp)+'/'+e.mhp;
    if(e.hp<=0){setTimeout(()=>combatWin(),380);return;}
  }
  if(G.pl.hp<=0){setTimeout(()=>combatLose(),650);return;}
  G.cTurn='p';dCBtns(false);refreshCUI();
}

function combatWin(){
  const e=G.ce;if(!e)return;e.alive=false;
  if(e.boss){
    G.bossDefeated[G.floor]=true;G.gs='dialogue';
    startDlg(e.t+'_dead',()=>{
      document.getElementById('cs').style.display='none';G.gs='explore';G.ce=null;
      if(G.floor===2){showChoice();return;}
      addMsg('Boss defeated! Find the ▼ stairs!','boss');gainXP(e.xp);SFX.win();
    });return;
  }
  addMsg(e.n+' defeated! +'+e.xp+' XP','xp');gainXP(e.xp);
  if(Math.random()<.38){G.pl.chimi++;addMsg('Dropped chimichanga! 🌮','item');}
  updUI();document.getElementById('cs').style.display='none';G.gs='explore';G.ce=null;
}
function combatLose(){
  document.getElementById('cs').style.display='none';G.gs='gameover';
  document.getElementById('go').style.display='flex';
  document.getElementById('gomsg').textContent='"Okay, this is embarrassing. I have REGENERATION. How did I — you know what. Fine. We restart. This conversation stays between us."';
  SFX.die();
}
function gainXP(amt){
  G.pl.exp+=amt;
  while(G.pl.exp>=G.pl.enx){
    G.pl.exp-=G.pl.enx;G.pl.lv++;G.pl.enx=Math.floor(G.pl.enx*1.65);
    G.pl.mhp+=10;G.pl.hp=G.pl.mhp;G.pl.mmp+=5;G.pl.mp=G.pl.mmp;G.pl.atk+=2;G.pl.def+=1;
    addMsg('LEVEL UP! LV.'+G.pl.lv+'! All stats improved!','lvl');SFX.lvl();showQuip('lvl');
  }
  updBars();updUI();
}
function showChoice(){G.gs='choice';document.getElementById('ec').style.display='flex';}
function doEnding(which){
  document.getElementById('ec').style.display='none';G.gs='ending';
  const el=document.getElementById('end');el.style.display='flex';
  if(which==='a'){
    document.getElementById('et').textContent='★ ENDING A: LIBERATION ★';
    document.getElementById('et').style.color='#ffd700';
    document.getElementById('etx').textContent='"Roll credits. I\'ve got a date with a taco truck and approximately zero regrets. You were great. Questionable movement choices aside. See you in the DLC."';
    document.getElementById('eterm').innerHTML='THE LOOP IS BROKEN.<br>THE KINGDOM IS REBORN.<br>MORGANA: PATCHED.<br><br>[POST-CREDITS: Anvil-7\'s forge-arm is finally removed<br>by a very confused surgeon. He weeps. The goat watches.]';
  }else{
    document.getElementById('et').textContent='★ ENDING B: THE MODDER ★';
    document.getElementById('et').style.color='#ff8800';
    document.getElementById('etx').textContent='"I could restore everything exactly as it was... OR I could just improve some things. The goat gets a hat. That\'s non-negotiable. That\'s the only thing I\'m certain of in this kingdom."';
    document.getElementById('eterm').innerHTML='THE PRINCESS IS SAVED.<br>THE KINGDOM IS MODDED.<br>DATA-MOTHER HAS A PODCAST.<br>ANVIL-7 HAS A RESTAURANT.<br><span style="color:#ffd700">THE GOAT HAS A HAT. 🎩</span><br><br>[FINAL: Chimichangas. Heavy metal 8-bit. Nobody is sad.]';
  }
  SFX.win();
}

  cx.fillStyle='#ff4444';cx.fillText('LV.'+p.lv,10,32);

  cx.fillStyle='#3a1020';cx.fillRect(52,10,148,11);
  cx.fillStyle='#cc2222';cx.fillRect(52,10,Math.round(Math.max(0,p.hp/p.mhp)*148),11);
  cx.fillStyle='rgba(255,100,100,.06)';cx.fillRect(52,10,148,11);
  cx.fillStyle='#ff4444';cx.fillText('HP',52,32);
  cx.fillStyle='#c07060';cx.fillText(Math.max(0,p.hp)+'/'+p.mhp,80,32);
  // MP
  cx.fillStyle='#10152e';cx.fillRect(230,10,108,11);
  cx.fillStyle='#2244cc';cx.fillRect(230,10,Math.round(Math.max(0,p.mp/p.mmp)*108),11);
  cx.fillStyle='#4466dd';cx.fillText('MP',230,32);
  cx.fillStyle='#6080c0';cx.fillText(p.mp+'/'+p.mmp,258,32);
  // EXP
  cx.fillStyle='#1e0e00';cx.fillRect(358,10,90,11);
  cx.fillStyle='#cc8800';cx.fillRect(358,10,Math.round(p.exp/p.enx*90),11);
  cx.fillStyle='#cc8800';cx.fillText('XP',358,32);
  // Stats
  cx.fillStyle='#7a2838';cx.fillText('ATK:'+p.atk+(G.corrupt>0?'↓':''),460,32);
  cx.fillStyle='#285848';cx.fillText('DEF:'+p.def,560,32);
  // Chimichangas
  cx.fillStyle='#ff8844';cx.fillText('🌮×'+p.chimi,650,32);

  const fl=G.mode==='village'?'GLITCH-HOLM':DFLOORS[G.floor].name;
  cx.textAlign='right';cx.fillStyle='#cc4422';cx.fillText(fl,950,32);cx.textAlign='left';
}
function renderMsgBar(){
  cx.fillStyle='#040001';cx.fillRect(0,496,960,44);
  cx.fillStyle='#1e0006';cx.fillRect(0,496,960,1);
  const shown=G.msgs.slice(-3).reverse();
  const cols={boss:'#ff2200',item:'#ff8844',lvl:'#ffd700',xp:'#ffee44','':'#7a4858'};
  cx.font='6px "Press Start 2P","Courier New"';
  shown.forEach((m,i)=>{
    cx.globalAlpha=Math.max(0,1-i*.32);
    cx.fillStyle=cols[m.type]||cols[''];
    cx.fillText('▸ '+m.txt,12,512+i*14);
  });
  cx.globalAlpha=1;
}

// ════════════════════════════════════════════════════
function renderTitle(now){
  const tc=document.getElementById('tcv').getContext('2d');tc.imageSmoothingEnabled=false;
  tc.fillStyle='#050001';tc.fillRect(0,0,960,540);
  // Grid
  tc.strokeStyle='rgba(170,0,0,.05)';tc.lineWidth=1;
  for(let x=0;x<960;x+=32){tc.beginPath();tc.moveTo(x,0);tc.lineTo(x,540);tc.stroke();}
  for(let y=0;y<540;y+=32){tc.beginPath();tc.moveTo(0,y);tc.lineTo(960,y);tc.stroke();}
  // Scanlines
  tc.fillStyle='rgba(0,0,0,.1)';for(let y=0;y<540;y+=3)tc.fillRect(0,y,960,1);
  // Glitch shift
  const gl=Math.random()<.05?ri(-6,6):0;
  // Title
  tc.font='22px "Press Start 2P","Courier New"';
  tc.fillStyle='rgba(255,0,0,0.2)';tc.fillText('DUNGEON QUEST',232+gl+3,208+3);
  tc.fillStyle='#cc2222';tc.fillText('DUNGEON QUEST',232+gl,208);
  tc.font='11px "Press Start 2P","Courier New"';
  tc.fillStyle='rgba(200,80,0,0.18)';tc.fillText('THE CRIMSON SIGIL',316+gl+2,238+2);
  tc.fillStyle='#bb5522';tc.fillText('THE CRIMSON SIGIL',316+gl,238);
  tc.font='6px "Press Start 2P","Courier New"';
  tc.fillStyle='#4a2820';tc.fillText("THE 'UNPATCHABLE' EDITION",348,262);
  // Merc sprite centered
  const bob=Math.sin(now/380)*2;
  drawMerc(tc,464,282+bob,Math.floor(now/200)%4,true,null,now);
  if(Math.random()<.04){tc.fillStyle='rgba(255,0,0,0.24)';tc.fillRect(464+ri(0,32),282+ri(0,32),ri(4,22),ri(2,7));}
  // Press start blink
  if(Math.floor(now/580)%2===0){
    tc.font='7px "Press Start 2P","Courier New"';
    tc.fillStyle='#cc4422';tc.fillText('▶  PRESS  ENTER  OR  CLICK  TO  START',184,432);
  }
  tc.font='5px "Press Start 2P","Courier New"';
  tc.fillStyle='#2a1010';tc.fillText('[INTERNAL ERROR: SCRIPT TOO AWESOME] — END OF FILE',254,508);
}

// ════════════════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════════════════
function render(now){
  if(G.gs==='title'){renderTitle(now);return;}
  const fi=G.floor;
  cx.fillStyle=G.mode==='village'?'#0e0a06':DFLOORS[fi].bg;
  cx.fillRect(0,0,960,540);
  // Clip to game area
  cx.save();
  let sx=0,sy=0;
  if(now<G.shakeEnd){
    const pr=Math.min(1,(G.shakeEnd-now)/180);
    sx=Math.round((Math.random()*2-1)*G.shakeAmt*pr);
    sy=Math.round((Math.random()*2-1)*G.shakeAmt*pr);
  }
  cx.translate(sx,sy);
  const ctX=Math.floor(G.camRX/TS),ctY=Math.floor(G.camRY/TS);
  const sbX=-(G.camRX-ctX*TS),sbY=-(G.camRY-ctY*TS);

  if(G.mode==='village'){
    for(let ty=ctY-1;ty<=ctY+VH+1;ty++)
      for(let tx=ctX-1;tx<=ctX+VW+1;tx++){
        if(ty<0||tx<0||ty>=14||tx>=30)continue;
        drawVTile(tx,ty,(tx-ctX)*TS+sbX,(ty-ctY)*TS+sbY+GY,now);
      }
    for(const npc of VNPCS){
      const px=npc.x*TS-G.camRX,py=npc.y*TS-G.camRY+GY;
      if(px<-TS*2||px>970||py<GY-TS||py>GY+GH+TS)continue;
      drawNPC(npc.type,px,py,now);
      cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(px+1,py-11,TS-2,9);
      cx.fillStyle='#cc4422';cx.font='5px "Press Start 2P","Courier New"';
      cx.fillText(npc.name.split(' ')[0],px+2,py-4);
    }
  }else{
    for(let ty=ctY-1;ty<=ctY+VH+1;ty++)
      for(let tx=ctX-1;tx<=ctX+VW+1;tx++){
        if(ty<0||tx<0||ty>=G.mh||tx>=G.mw)continue;
        drawDTile(tx,ty,(tx-ctX)*TS+sbX,(ty-ctY)*TS+sbY+GY,fi);
      }
    // Enemies
    for(const e of G.ents){
      if(!e.alive)continue;
      const idle=Math.abs(e.animX)<1&&Math.abs(e.animY)<1?Math.sin(now/370+e.x*1.2)*.75:0;
      const spx=e.x*TS+e.animX-G.camRX,spy=e.y*TS+e.animY+idle-G.camRY+GY;
      if(spx<-TS*2||spx>970||spy<GY-TS||spy>GY+GH+TS)continue;
      if(e.boss){drawBoss(cx,e.t,spx,spy,G.bPhase,now,e);cx.fillStyle='rgba(255,0,0,.07)';cx.fillRect(spx-4,spy-4,TS+8,TS+8);}
      else drawEnemy(cx,e.t,spx,spy,e,now);
      // HP bar
      const pct=e.hp/e.mhp,bw=26,bx=spx+(TS-bw)/2,by=spy-7;
      cx.fillStyle='#1a0000';cx.fillRect(bx,by,bw,4);
      cx.fillStyle=pct>.5?'#cc2222':pct>.25?'#dd6600':'#ffaa00';
      cx.fillRect(bx,by,Math.ceil(bw*pct),4);
    }
    // Floor label (small, in game area)
    cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(4,GY+4,170,14);
    cx.fillStyle='#8a3020';cx.font='6px "Press Start 2P","Courier New"';
    cx.fillText(DFLOORS[fi].name,7,GY+13);
  }
  // Player
  const imov=Math.abs(G.pl.animX)>4||Math.abs(G.pl.animY)>4;
  const plBob=imov?0:Math.sin(now/265)*1;
  drawMerc(cx,G.pl.x*TS+G.pl.animX-G.camRX,G.pl.y*TS+G.pl.animY+plBob-G.camRY+GY,G.pl.ws,imov,G.pl.hf,now);
  renderParts(now);
  cx.restore();
  // HUD + msgs
  renderHUD();renderMsgBar();
  // CRT
  cx.fillStyle='rgba(0,0,0,.03)';for(let y=0;y<540;y+=3)cx.fillRect(0,y,960,1);
  // Vignette
  const vg=cx.createRadialGradient(480,270,140,480,270,370);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.5)');
  cx.fillStyle=vg;cx.fillRect(0,0,960,540);
  // Update boss portrait in combat
  if(G.gs==='combat'&&G.ce?.boss){
    const ep=document.getElementById('cep');
    const ec=ep.getContext('2d');ec.imageSmoothingEnabled=false;
    ec.fillStyle='#040001';ec.fillRect(0,0,96,96);
    drawBoss(ec,G.ce.t,16,8,G.bPhase,now,G.ce);
  }
}

// ════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════
function gameLoop(now){
  G.raf=requestAnimationFrame(gameLoop);
  const dt=Math.min(now-G.lastFrame,50);G.lastFrame=now;
  updAnim(dt);
  if(G.gs==='explore'&&G.mode==='dungeon')
    for(const e of G.ents)
      if(e.alive&&!e.boss&&e.mv>0&&now>=e.nm){
        moveEnemy(e,now);if(G.gs==='explore')e.nm=now+e.mv+ri(-100,100);
      }
  tickBubble();render(now);
}

// ════════════════════════════════════════════════════
// INPUT
// ════════════════════════════════════════════════════
const DIRS={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
  w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};
document.addEventListener('keydown',ev=>{
  if(G.gs==='title'){ev.preventDefault();G.gs='explore';document.getElementById('title').style.display='none';return;}
  if(G.gs==='dialogue'){ev.preventDefault();advDlg();return;}
  const dir=DIRS[ev.key];if(dir){ev.preventDefault();tryMove(...dir);}
});
document.getElementById('title').addEventListener('click',()=>{
  if(G.gs==='title'){G.gs='explore';document.getElementById('title').style.display='none';}
});
document.getElementById('dlg').addEventListener('click',()=>{if(G.gs==='dialogue')advDlg();});
let ts=null;
document.getElementById('mc').addEventListener('touchstart',ev=>{ts={x:ev.touches[0].clientX,y:ev.touches[0].clientY};ev.preventDefault();},{passive:false});
document.getElementById('mc').addEventListener('touchend',ev=>{
  if(!ts)return;
  const dx=ev.changedTouches[0].clientX-ts.x,dy=ev.changedTouches[0].clientY-ts.y;
  if(G.gs==='dialogue')advDlg();
  else if(G.gs==='title'){G.gs='explore';document.getElementById('title').style.display='none';}
  else if(G.gs==='explore'&&Math.max(Math.abs(dx),Math.abs(dy))>14)
    Math.abs(dx)>Math.abs(dy)?tryMove(dx>0?1:-1,0):tryMove(0,dy>0?1:-1);
  ts=null;ev.preventDefault();
},{passive:false});

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
function initGame(){
  cancelAnimationFrame(G.raf);
  Object.assign(G,{
    gs:'title',mode:'village',floor:0,
    pl:{x:15,y:7,hp:50,mhp:50,mp:30,mmp:30,atk:8,def:3,lv:1,exp:0,enx:50,
        chimi:3,ws:0,animX:0,animY:0,hf:0},
    ents:[],dmap:[],mw:0,mh:0,
    cam:{x:0,y:0},camRX:0,camRY:0,
    parts:[],shakeAmt:0,shakeEnd:0,
    bossDefeated:[false,false,false],npcMet:{anvil:false,data:false},
    ce:null,cTurn:'p',cTn:0,dashReady:false,bPhase:1,glitchMode:false,corrupt:0,
    dLines:[],dIdx:0,dFull:'',dChar:0,dTimer:null,dCb:null,
    bbl:{txt:'',end:0},msgs:[],lastFrame:performance.now(),raf:0
  });
  ['cs','dlg','bbl','ec','end','go'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.display='none';
  });
  document.getElementById('title').style.display='flex';
  clrCLog();
  G.msgs=[];
  addMsg('"I wake up in a pixel village. Classic.","q"');
  addMsg('"Talk to NPCs. Enter the ◆ portal. Three bosses."');
  G.lastFrame=performance.now();
  G.raf=requestAnimationFrame(gameLoop);
}

document.fonts.ready.then(()=>{fitScreen();initGame();});
</script>
